# DSTformer (Dual-Stream Spatio-Temporal Transformer) configuration
name: dstformer

# Input/Output
num_joints: 17
input_dim: 2   # 2D input keypoints (x, y) - confidence added internally
output_dim: 3  # 3D output coordinates
seq_len: 243   # Temporal window (frames)

# Architecture (matches MotionBERT defaults for weight compatibility)
embed_dim: 256
dim_rep: 512
depth: 5
num_heads: 8
mlp_ratio: 4.0
drop_rate: 0.0
attn_drop_rate: 0.0
drop_path_rate: 0.1

# LoRA fine-tuning
lora:
  enabled: false
  rank: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - qkv      # Q, K, V projections
    - proj     # Output projection

# Pretrained weights (MotionBERT AMASS/H36M)
# Download from: https://github.com/Walter0807/MotionBERT/releases
pretrained_path: null
