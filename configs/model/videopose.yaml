# VideoPose3D: Temporal Convolutional Network for 3D Pose Estimation
# Reference: https://github.com/facebookresearch/VideoPose3D
name: videopose

# Input/Output
num_joints: 17
input_dim: 2   # 2D input keypoints (x, y)
output_dim: 3  # 3D output coordinates
seq_len: 243   # Temporal window (frames)

# Architecture
hidden_dim: 1024    # Hidden dimension for temporal blocks
num_blocks: 4       # Number of temporal convolution blocks (dilation: 1,2,4,8)
kernel_size: 3      # Convolution kernel size
drop_rate: 0.25     # Dropout rate

# LoRA fine-tuning
lora:
  enabled: false
  rank: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - input_proj
    - output_proj

# Pretrained weights
# Download from: https://github.com/facebookresearch/VideoPose3D
pretrained_path: null
