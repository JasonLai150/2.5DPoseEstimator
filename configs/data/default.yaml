# Data configuration
batch_size: 64
num_workers: 4
pin_memory: true

# Skeleton format
input_skeleton: coco_17
output_skeleton: h36m_17

# Temporal
seq_len: 243
stride: 1

# Datasets
datasets:
  # 3D supervised data
  h36m:
    path: ./data/human36m
    subjects_train: [1, 5, 6, 7, 8]
    subjects_test: [9, 11]
    actions: all

  # 2D weakly-supervised data
  gym_videos:
    path: ./data/gym_videos
    detector: yolo_pose  # or openpose
    confidence_threshold: 0.3

  # Evaluation data
  fit3d:
    path: ./data/fit3d
    split: test

# Augmentation
augmentation:
  enabled: true
  flip_prob: 0.5
  scale_range: [0.9, 1.1]
  rotation_range: [-15, 15]  # degrees
