# Training configuration
epochs: 100
gradient_clip: 1.0

# Optimizer
optimizer:
  name: adamw
  lr: 1e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]

# Scheduler
scheduler:
  name: cosine
  warmup_epochs: 5
  min_lr: 1e-6

# Loss weights (lambda values)
loss_weights:
  l3d: 1.0           # Supervised 3D loss
  reproj: 0.5        # Reprojection loss
  biomech: 0.1       # Biomechanical constraints

# Biomechanical loss components
biomech:
  symmetry_weight: 1.0
  hinge_weight: 1.0
  # Joint angle limits (degrees)
  angle_limits:
    knee: [0, 160]    # No hyperextension
    elbow: [0, 160]

# Checkpointing
checkpoint:
  save_every: 10       # epochs
  keep_last: 3
  save_best: true
  monitor: val/mpjpe
  mode: min

# Validation
val_every: 1  # epochs
